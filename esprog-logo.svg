<svg width="1200" height="360" viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ESProg Logo</title>
  <desc id="desc">A logo for ESProg, an ESP32-S3 USB to SPI NOR flash programmer.</desc>

  <defs>
    <linearGradient id="chipGradient" x1="120" y1="60" x2="330" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>

    <linearGradient id="accentGradient" x1="210" y1="80" x2="300" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#020617" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="42" fill="#f8fafc"/>

  <!-- Logo mark group -->
  <g transform="translate(92 58)" filter="url(#softShadow)">
    <!-- USB plug tail -->
    <path d="M22 122 H78" stroke="#0f172a" stroke-width="22" stroke-linecap="round"/>
    <rect x="0" y="98" width="42" height="48" rx="8" fill="#0f172a"/>
    <rect x="8" y="108" width="8" height="12" rx="2" fill="#f8fafc"/>
    <rect x="26" y="108" width="8" height="12" rx="2" fill="#f8fafc"/>

    <!-- Chip body -->
    <rect x="76" y="34" width="220" height="220" rx="34" fill="url(#chipGradient)"/>

    <!-- Pins left -->
    <g fill="#334155">
      <rect x="52" y="60" width="28" height="16" rx="4"/>
      <rect x="52" y="96" width="28" height="16" rx="4"/>
      <rect x="52" y="132" width="28" height="16" rx="4"/>
      <rect x="52" y="168" width="28" height="16" rx="4"/>
      <rect x="52" y="204" width="28" height="16" rx="4"/>
    </g>

    <!-- Pins right -->
    <g fill="#334155">
      <rect x="292" y="60" width="28" height="16" rx="4"/>
      <rect x="292" y="96" width="28" height="16" rx="4"/>
      <rect x="292" y="132" width="28" height="16" rx="4"/>
      <rect x="292" y="168" width="28" height="16" rx="4"/>
      <rect x="292" y="204" width="28" height="16" rx="4"/>
    </g>

    <!-- Pins top -->
    <g fill="#334155">
      <rect x="112" y="10" width="16" height="28" rx="4"/>
      <rect x="148" y="10" width="16" height="28" rx="4"/>
      <rect x="184" y="10" width="16" height="28" rx="4"/>
      <rect x="220" y="10" width="16" height="28" rx="4"/>
      <rect x="256" y="10" width="16" height="28" rx="4"/>
    </g>

    <!-- Pins bottom -->
    <g fill="#334155">
      <rect x="112" y="250" width="16" height="28" rx="4"/>
      <rect x="148" y="250" width="16" height="28" rx="4"/>
      <rect x="184" y="250" width="16" height="28" rx="4"/>
      <rect x="220" y="250" width="16" height="28" rx="4"/>
      <rect x="256" y="250" width="16" height="28" rx="4"/>
    </g>

    <!-- Inner chip border -->
    <rect x="106" y="64" width="160" height="160" rx="26" fill="none" stroke="#475569" stroke-width="6"/>

    <!-- Lightning / flash bolt -->
    <path d="M196 70 L135 155 H178 L158 222 L235 127 H188 Z"
          fill="url(#accentGradient)"/>

    <!-- SPI trace dots -->
    <circle cx="121" cy="183" r="6" fill="#38bdf8"/>
    <circle cx="251" cy="103" r="6" fill="#38bdf8"/>
    <path d="M121 183 C82 183 82 104 121 104" stroke="#38bdf8" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M251 103 C292 103 292 184 251 184" stroke="#38bdf8" stroke-width="8" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(430 108)">
    <text x="0" y="82"
          font-family="Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
          font-size="86"
          font-weight="800"
          letter-spacing="-3"
          fill="#0f172a">ESProg</text>

    <text x="4" y="132"
          font-family="Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
          font-size="28"
          font-weight="500"
          letter-spacing="1.8"
          fill="#475569">ESP32-S3 USB · SPI NOR FLASH PROGRAMMER</text>

    <!-- Accent underline -->
    <rect x="6" y="158" width="330" height="10" rx="5" fill="url(#accentGradient)"/>
  </g>
</svg>
